appId: com.tuempresa.sistema-facturacion
productName: SistemaFacturacion
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - prisma/**/*
asarUnpack:
  - "**/*.node"
  - prisma/**/*
win:
  target:
    - nsis
  artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
linux:
  target:
    - AppImage
  category: Finance
mac:
  target:
    - dmg
extraResources:
  - from: prisma/
    to: prisma/
    filter:
      - "**/*"
